app = "jobsearch"
primary_region = "cdg"

[build]
  dockerfile = "backend/Dockerfile"

[deploy]
  release_command = "sh -c 'cd /app/backend && python -m alembic upgrade head'"

[env]
  REDIS_URL = ""
  LOG_LEVEL = "INFO"

[processes]
  app = "uvicorn src.main:app --host 0.0.0.0 --port 8080 --proxy-headers --forwarded-allow-ips='*'"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[http_service.checks]]
  interval = "30s"
  timeout = "10s"
  grace_period = "60s"
  method = "GET"
  path = "/health"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
