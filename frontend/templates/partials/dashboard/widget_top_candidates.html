<section class="card dash-widget mb-xl" data-widget="top_candidates">
  <h2 class="section-title">Top 5 candidature</h2>
  {% if top_candidates %}
  <div class="dash-table-wrap">
    <table class="dash-table">
      <thead>
        <tr>
          <th>Score</th>
          <th>Azienda</th>
          <th>Ruolo</th>
          <th>Location</th>
          <th>Modalità</th>
          <th>Stato</th>
        </tr>
      </thead>
      <tbody>
        {% for c in top_candidates %}
        <tr>
          <td><span class="score-badge score-{{ 'high' if c.score >= 85 else ('mid' if c.score >= 70 else 'low') }}">{{ c.score }}</span></td>
          <td><a href="/analysis/{{ c.id }}" class="dash-widget-row-title">{{ c.company }}</a></td>
          <td>{{ c.role }}</td>
          <td class="meta-small">{{ c.location }}</td>
          <td class="meta-small">{{ c.work_mode }}</td>
          <td><span class="status-badge status-badge-{{ c.status }}">{{ c.status }}</span></td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
  {% else %}
    <div class="empty-state" style="padding: var(--space-lg);">Nessuna candidatura attiva</div>
  {% endif %}
</section>
