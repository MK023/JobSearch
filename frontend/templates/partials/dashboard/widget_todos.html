<section class="card dash-widget" data-widget="todos">
  <h2 class="section-title">To-do</h2>
  {% if agenda_triage_todos or agenda_todos %}
    {% for t in agenda_triage_todos %}
    <div class="dash-widget-row">
      <div class="dash-widget-row-main">
        <a href="{{ t.action_url }}" class="dash-widget-row-title">&#x1F4DD; {{ t.text }}</a>
      </div>
    </div>
    {% endfor %}
    {% for t in agenda_todos %}
    <div class="dash-widget-row">
      <span class="dash-widget-row-main">{{ t.text }}</span>
    </div>
    {% endfor %}
    <div style="margin-top: var(--space-md);"><a href="/agenda" class="link-cta">Apri agenda</a></div>
  {% else %}
    <div class="empty-state" style="padding: var(--space-lg);">Nessun to-do pendente</div>
  {% endif %}
</section>
