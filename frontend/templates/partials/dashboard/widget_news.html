<section class="card dash-widget" data-widget="news">
  <h2 class="section-title">News aziende</h2>
  {% if recent_news %}
    {% for n in recent_news %}
    <div class="dash-widget-row">
      <div class="dash-widget-row-main">
        <a href="{{ n.link }}" target="_blank" rel="noopener noreferrer" class="dash-widget-row-title">{{ n.title|truncate(60) }}</a>
        <span class="dash-widget-row-sub">{{ n.company }} &middot; {{ n.source_name }}</span>
      </div>
      <span class="meta-small">{{ n.published_at[:10] if n.published_at else '' }}</span>
    </div>
    {% endfor %}
    <div style="margin-top: var(--space-md);"><a href="/news" class="link-cta">Tutte le news</a></div>
  {% else %}
    <div class="empty-state" style="padding: var(--space-lg);">Le news appariranno dopo l'analisi</div>
  {% endif %}
</section>
