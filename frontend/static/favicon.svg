<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- 5 petali a ventaglio in gradazione ember — metafora: il profilo che si apre in più direzioni (career track + opportunità) -->
  <!-- Pivot comune in basso-sinistra (11, 26). Rotazione progressiva -10° → +50° -->
  <!-- Colori: dal più saturo (back) al più chiaro (front) -->
  <g transform="translate(11 26)">
    <path d="M 0 0 Q -3.2 -9 0 -18 Q 3.2 -9 0 0 Z" fill="#8a4a24" transform="rotate(-10)"/>
    <path d="M 0 0 Q -3.2 -9 0 -18 Q 3.2 -9 0 0 Z" fill="#b56332" transform="rotate(5)"/>
    <path d="M 0 0 Q -3.2 -9 0 -18 Q 3.2 -9 0 0 Z" fill="#e87d3e" transform="rotate(20)"/>
    <path d="M 0 0 Q -3.2 -9 0 -18 Q 3.2 -9 0 0 Z" fill="#f09b6b" transform="rotate(35)"/>
    <path d="M 0 0 Q -3.2 -9 0 -18 Q 3.2 -9 0 0 Z" fill="#f5c9a5" transform="rotate(50)"/>
  </g>
</svg>
