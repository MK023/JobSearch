name: Daily full pg_dump backup

# Calls the production /api/v1/backup/full endpoint to upload a full
# pg_dump archive (schema + data + sequences + FKs + ENUMs) to R2.
#
# Pairs with daily-backup.yml (which dumps 7 critical tables as JSON
# at 03:30 UTC). The pg_dump runs at 03:00 UTC — 30 min ahead so the
# two pipelines never overlap on the Render free-tier compute.
#
# Cadence: daily, retention 14 archives in db_dump.MAX_PG_DUMPS.
# Sweet spot for single-user / low-write workload (~5-20 row/day):
# RPO of 24h is well below the data-volume noise floor, retention
# of 14 days gives 2 weeks of point-in-time recovery, total R2
# storage stays around ~70 MB.
#
# Auth: X-API-Key header against settings.api_key (same path as the
# JSON daily backup). Set the GitHub Actions secret JOBSEARCH_API_KEY.

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  full-backup:
    name: Run full pg_dump backup
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      API_BASE: https://www.jobsearches.cc
      API_KEY: ${{ secrets.JOBSEARCH_API_KEY }}
    steps:
      - name: Wake up app (GET /health)
        run: |
          set -uo pipefail
          echo "Hitting /health to wake up Render free-tier instance..."
          curl --silent --show-error --max-time 30 "${API_BASE}/health" || echo "::warning::health check failed (app may still be waking up)"

      - name: Wait for app to start
        run: sleep 30

      - name: Call POST /api/v1/backup/full
        run: |
          set -euo pipefail
          if [ -z "$API_KEY" ]; then
            echo "::error::JOBSEARCH_API_KEY secret not configured"
            exit 1
          fi
          # Longer timeout than the JSON daily: pg_dump for a 100 MB DB
          # + gzip + R2 upload can take several minutes. The endpoint
          # itself caps the dump at PG_DUMP_TIMEOUT_SECONDS (10 min).
          response=$(curl --silent --show-error --fail-with-body \
            --request POST \
            --header "X-API-Key: $API_KEY" \
            --header "Accept: application/json" \
            --max-time 720 \
            "${API_BASE}/api/v1/backup/full")
          echo "Response: $response"
          echo "$response" | grep -q '"ok": *true' || (echo "::error::full backup did not return ok=true" && exit 1)
