name: Weekly full pg_dump backup

# Calls the production /api/v1/backup/full endpoint to upload a full
# pg_dump archive (schema + data + sequences + FKs + ENUMs) to R2.
#
# Pairs with daily-backup.yml (which only dumps 7 tables as JSON).
# Weekly cadence is the cost/recovery sweet spot for a single-user app:
# JSON daily for fast partial restore; pg_dump weekly for the rare
# full-DB recovery that absolutely must include audit_logs, users,
# linkedin_applications, alembic_version, etc.
#
# Auth: X-API-Key header against settings.api_key (same path as the
# daily backup). Set the GitHub Actions secret JOBSEARCH_API_KEY.
#
# Schedule: every Sunday at 04:00 UTC (30 min after daily backup at
# 03:30 — avoids overlap on Sundays). Manual trigger via "Run workflow".

on:
  schedule:
    - cron: "0 4 * * 0"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  full-backup:
    name: Run full pg_dump backup
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      API_BASE: https://www.jobsearches.cc
      API_KEY: ${{ secrets.JOBSEARCH_API_KEY }}
    steps:
      - name: Wake up app (GET /health)
        run: |
          set -uo pipefail
          echo "Hitting /health to wake up Render free-tier instance..."
          curl --silent --show-error --max-time 30 "${API_BASE}/health" || echo "::warning::health check failed (app may still be waking up)"

      - name: Wait for app to start
        run: sleep 30

      - name: Call POST /api/v1/backup/full
        run: |
          set -euo pipefail
          if [ -z "$API_KEY" ]; then
            echo "::error::JOBSEARCH_API_KEY secret not configured"
            exit 1
          fi
          # Longer timeout than daily JSON: pg_dump for a 100 MB DB +
          # gzip + R2 upload can take several minutes. The endpoint
          # itself caps the dump at PG_DUMP_TIMEOUT_SECONDS (10 min).
          response=$(curl --silent --show-error --fail-with-body \
            --request POST \
            --header "X-API-Key: $API_KEY" \
            --header "Accept: application/json" \
            --max-time 720 \
            "${API_BASE}/api/v1/backup/full")
          echo "Response: $response"
          echo "$response" | grep -q '"ok": *true' || (echo "::error::full backup did not return ok=true" && exit 1)
