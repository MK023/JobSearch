name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

jobs:
  # ── Backend: Linting, Formatting & Type Checking ──────────────────
  lint:
    name: Ruff Lint, Format & Mypy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: pip install ruff mypy -r backend/requirements.txt
      - name: Ruff lint
        run: ruff check backend/src/ backend/tests/
      - name: Ruff format check
        run: ruff format --check backend/src/ backend/tests/
      - name: Mypy type check (strict, all modules)
        run: |
          mypy backend/src/ \
            --ignore-missing-imports \
            --disallow-untyped-defs \
            --no-implicit-optional \
            --warn-return-any \
            --follow-imports=silent

  # ── Frontend: Lint & Validate ──────────────────────────────────────
  frontend:
    name: Frontend Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install stylelint (pinned to match pre-commit)
        run: npm install -g stylelint@16.12.0 stylelint-config-standard@36.0.1

      - name: Lint CSS
        run: stylelint "frontend/static/css/**/*.css" --formatter compact

      - name: Validate HTML templates (syntax check)
        run: |
          echo "Checking for unclosed tags and common HTML issues..."
          for f in $(find frontend/templates -name '*.html'); do
            # Check for mismatched div tags (basic)
            opens=$(grep -c '<div' "$f" || true)
            closes=$(grep -c '</div>' "$f" || true)
            if [ "$opens" != "$closes" ]; then
              echo "WARNING: $f has $opens <div> opens but $closes </div> closes"
            fi
          done
          echo "HTML template check complete."

      - name: Install ESLint
        run: npm ci

      - name: Lint JS (ESLint)
        run: npx eslint frontend/static/js/

  # ── Security Audit ──────────────────────────────────────────────────
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install audit tools
        run: pip install bandit pip-audit

      - name: Bandit security scan (report)
        run: bandit -r backend/src/ -c pyproject.toml -f json -o bandit-report.json || true

      - name: Bandit security scan (fail on high severity)
        run: bandit -r backend/src/ -c pyproject.toml -ll -ii

      - name: pip-audit dependency vulnerabilities
        run: pip-audit -r backend/requirements.txt --desc

      - name: Upload Bandit report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: bandit-report
          path: bandit-report.json
          retention-days: 30

  # ── Tests ───────────────────────────────────────────────────────────
  test:
    name: Tests & Coverage
    runs-on: ubuntu-latest
    needs: [lint, frontend]
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v6
        with:
          # fetch-depth 0 so SonarCloud can compute PR diffs and blame info.
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        # pytest-asyncio required for the SSE broadcaster tests (async def
        # functions). Present locally via dev extras, missing here — keep
        # the >=1.3 range aligned with pyproject dev group.
        run: pip install -r requirements.txt pytest pytest-cov 'pytest-asyncio>=1.3'

      - name: Run tests with coverage
        env:
          DATABASE_URL: "sqlite:///test.db"
          ANTHROPIC_API_KEY: "test-key"
          SECRET_KEY: "test-secret-key-for-ci"
        run: |
          pytest tests/ -v --tb=short \
            --cov=src --cov-report=term-missing --cov-report=xml:coverage.xml \
            --cov-fail-under=50

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: backend/coverage.xml
          retention-days: 30

      # SonarCloud scan runs here (not in a separate workflow) so it has direct
      # access to backend/coverage.xml — required to evaluate the new_coverage
      # quality gate condition. Scanner must run from repo root to find
      # sonar-project.properties, hence the working-directory override.
      - name: SonarCloud scan
        # Skip on PRs from forks (no SONAR_TOKEN) and on Dependabot PRs
        # (GitHub exposes Actions secrets to Dependabot only if registered
        # under the separate Dependabot secrets scope — we haven't).
        if: >-
          success()
          && github.actor != 'dependabot[bot]'
          && (github.event_name == 'push'
              || github.event.pull_request.head.repo.full_name == github.repository)
        uses: SonarSource/sonarqube-scan-action@master
        with:
          projectBaseDir: ${{ github.workspace }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io

  # ── Alembic migrations: both DBs in one job ────────────────────────
  # Validates that the full migration chain applies cleanly on real Postgres
  # (catches JSONB / expression-index / dialect-only breakage that SQLite
  # tests can't see). Driven by user instruction after a past JobSearch
  # DB-loss incident. One job + two services keeps setup cost low; step
  # names make per-DB failure diagnosis still obvious in the Actions UI.
  migrations:
    name: Alembic migrations (primary + worldwild)
    runs-on: ubuntu-latest
    services:
      pg-primary:
        image: postgres:17
        env:
          POSTGRES_USER: jobsearch
          POSTGRES_PASSWORD: jobsearch
          POSTGRES_DB: jobsearch
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      pg-worldwild:
        image: postgres:17
        env:
          POSTGRES_USER: worldwild
          POSTGRES_PASSWORD: worldwild
          POSTGRES_DB: worldwild
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5433:5432
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: pip install -r backend/requirements.txt
      - name: Run primary alembic upgrade head
        env:
          DATABASE_URL: postgresql://jobsearch:jobsearch@localhost:5432/jobsearch
        working-directory: backend
        run: PYTHONPATH=. alembic upgrade head
      - name: Smoke check primary tables exist
        env:
          DATABASE_URL: postgresql://jobsearch:jobsearch@localhost:5432/jobsearch
        working-directory: backend
        run: |
          python3 - <<'PY'
          import os, psycopg2
          conn = psycopg2.connect(os.environ['DATABASE_URL'])
          cur = conn.cursor()
          cur.execute(
              "SELECT table_name FROM information_schema.tables "
              "WHERE table_schema='public' ORDER BY table_name"
          )
          tables = {r[0] for r in cur.fetchall()}
          required = {'users', 'job_analyses', 'linkedin_applications', 'audit_logs', 'alembic_version'}
          missing = required - tables
          assert not missing, f"primary missing tables: {missing}"
          print(f"OK primary — {len(tables)} tables, all required present.")
          PY
      - name: Run worldwild alembic upgrade head
        env:
          WORLDWILD_DATABASE_URL: postgresql://worldwild:worldwild@localhost:5433/worldwild
        working-directory: backend
        run: PYTHONPATH=. alembic --name worldwild upgrade head
      - name: Smoke check worldwild tables exist
        env:
          WORLDWILD_DATABASE_URL: postgresql://worldwild:worldwild@localhost:5433/worldwild
        working-directory: backend
        run: |
          python3 - <<'PY'
          import os, psycopg2
          conn = psycopg2.connect(os.environ['WORLDWILD_DATABASE_URL'])
          cur = conn.cursor()
          cur.execute(
              "SELECT table_name FROM information_schema.tables "
              "WHERE table_schema='public' ORDER BY table_name"
          )
          tables = {r[0] for r in cur.fetchall()}
          required = {'job_offers', 'decisions', 'adapter_runs', 'audit_logs', 'alembic_version'}
          missing = required - tables
          assert not missing, f"worldwild missing tables: {missing}"
          print(f"OK worldwild — {len(tables)} tables, all required present.")
          PY

  # ── Docker Build + Smoke ────────────────────────────────────────────
  # Build all containers, spin up the full stack with the CI override
  # (no live-mount, no persistent volumes, fixture secrets), wait until
  # backend healthcheck passes, run a smoke HTTP check, dump container
  # logs to the Actions output for diagnosability, then tear down.
  #
  # Driven by Marco's instruction: "non voglio cazzi mentre facciamo la
  # build" + "uno spooler con permessi per monitorare tutto" — the
  # log-dump step IS the spooler (collects per-service logs into the
  # CI run for postmortem if any step fails).
  docker:
    name: Docker Build & Smoke
    runs-on: ubuntu-latest
    needs: [test, security, migrations]
    steps:
      - uses: actions/checkout@v6

      - name: Build containers (immutable, no cache for safety)
        run: docker compose -f docker-compose.yml build

      - name: Spin up the full stack (detached)
        run: docker compose -f docker-compose.yml up -d

      - name: Wait for backend healthcheck to pass (timeout 90s)
        run: |
          set -uo pipefail
          for i in $(seq 1 18); do
            status=$(docker inspect --format='{{.State.Health.Status}}' \
              "$(docker compose -f docker-compose.yml ps -q backend)" 2>/dev/null || echo "starting")
            echo "[$i/18] backend health: $status"
            if [ "$status" = "healthy" ]; then
              echo "::notice::backend healthy after ${i}0 seconds"
              exit 0
            fi
            sleep 5
          done
          echo "::error::backend never became healthy in 90s"
          exit 1

      - name: Container status snapshot
        if: always()
        run: docker compose -f docker-compose.yml ps

      - name: Smoke test — GET /health via container network
        run: |
          set -euo pipefail
          docker compose -f docker-compose.yml \
            exec -T backend python3 -c "
          import urllib.request, sys
          r = urllib.request.urlopen('http://localhost:8000/health', timeout=5)
          assert r.status == 200, r.status
          print('OK /health =', r.status)
          "

      - name: Smoke test — pg_dump binary inside backend container
        # Disaster-recovery guard: the weekly pg_dump backup pipeline
        # (src/integrations/db_dump.py) shells out to pg_dump. If a
        # future Dockerfile change drops postgresql-client-17, the
        # weekly backup would silently fail until the next R2 retention
        # window — by which point the JSON-only backup would be the
        # last line of defence. Catch it here on every CI run instead.
        run: |
          set -euo pipefail
          docker compose -f docker-compose.yml \
            exec -T backend pg_dump --version
          docker compose -f docker-compose.yml \
            exec -T backend python3 -c "from src.integrations.db_dump import _resolve_pg_dump_binary; print('OK pg_dump path:', _resolve_pg_dump_binary())"

      - name: Spooler — dump per-service logs to CI output
        # Always runs (success or failure) so any container crash leaves a
        # full forensic trail in the Actions run UI.
        if: always()
        run: |
          for svc in backend frontend db redis; do
            echo "::group::logs for $svc"
            docker compose -f docker-compose.yml logs --no-color --tail=200 $svc || true
            echo "::endgroup::"
          done

      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.yml down --volumes --remove-orphans

  # Deploy is handled by Render auto-deploy on push to main
