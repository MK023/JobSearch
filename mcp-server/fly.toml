app = "jobsearch-mcp"
primary_region = "cdg"

[build]
  dockerfile = "Dockerfile"

[env]
  BACKEND_URL = "https://jobsearch.fly.dev"
  MCP_HOST = "0.0.0.0"
  MCP_PORT = "8081"

[http_service]
  internal_port = 8081
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
