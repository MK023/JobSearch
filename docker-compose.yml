services:
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
    volumes:
      - ./frontend/static:/usr/share/nginx/html/static
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - jobsearch

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    expose:
      - "8000"
    environment:
      # Core — defaults sicuri per CI / dev offline. In prod Render settta
      # le env vars dalla dashboard e questi default sono ininfluenti.
      # Il fixture ANTHROPIC key permette al lifespan startup di passare
      # senza una chiave reale (CI non chiama mai l'API).
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-ci-fixture-anthropic-key-not-real}
      DATABASE_URL: ${DATABASE_URL:-postgresql://jobsearch:jobsearch@db:5432/jobsearch}
      REDIS_URL: redis://redis:6379/0
      # Auth
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-change-in-production}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@jobsearch.local}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-changeme}
      # External services (graceful empty defaults)
      RAPIDAPI_KEY: ${RAPIDAPI_KEY:-}
      SENTRY_DSN: ${SENTRY_DSN:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-}
      R2_ENDPOINT_URL: ${R2_ENDPOINT_URL:-}
      R2_BUCKET_NAME: ${R2_BUCKET_NAME:-jobsearch-files}
      # WorldWild secondary DB + Adzuna ingest (graceful empty → layer disabled)
      WORLDWILD_DATABASE_URL: ${WORLDWILD_DATABASE_URL:-}
      ADZUNA_APP_ID: ${ADZUNA_APP_ID:-}
      ADZUNA_APP_KEY: ${ADZUNA_APP_KEY:-}
      # Networking
      CORS_ALLOWED_ORIGINS: "http://localhost,http://localhost:80"
      TRUSTED_HOSTS: "localhost,backend"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      # Wait for /health to respond 200 before flagging the service ready.
      # Without this, CI / orchestrators flip "started" the instant the
      # container PID exists, and the next step's smoke test races against
      # an app still importing modules / running Alembic migrations.
      # Same shape as a K8s `readinessProbe.httpGet`: curl -fsS exits
      # non-zero on any 4xx/5xx + on connection failure.
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    volumes:
      - ./backend:/app/backend
      - ./frontend:/app/frontend
    networks:
      - jobsearch

  db:
    # Pinned to 17 for dev/prod parity (Neon + Supabase prod entrambi su PG 17).
    # Mismatch versione dialect-specific tra dev e prod ha già bruciato un
    # deploy in passato — see 12-factor "dev/prod parity".
    image: postgres:17-alpine
    environment:
      # Default credenziali fisse: safe in CI (DB effimero, niente
      # persistenza) e in dev (allineate al DATABASE_URL default sopra).
      # In prod il DB è Supabase, non questo container.
      POSTGRES_USER: ${POSTGRES_USER:-jobsearch}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-jobsearch}
      POSTGRES_DB: ${POSTGRES_DB:-jobsearch}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      # `$$` escapes Compose interpolation so the container shell expands
      # POSTGRES_USER at runtime (from the merged `environment:` block).
      # Without the escape, Compose tries to interpolate from the host's
      # env at parse-time and resolves to "" in CI — pg_isready then runs
      # with no user and the healthcheck fails forever (#199 incident).
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 5s
      timeout: 3s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"
    networks:
      - jobsearch

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"
    networks:
      - jobsearch

networks:
  jobsearch:
    driver: bridge

volumes:
  pgdata:
