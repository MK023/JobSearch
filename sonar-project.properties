sonar.organization=mk023
sonar.projectKey=MK023_JobSearch
sonar.projectName=JobSearch
sonar.projectVersion=2.0.0

# Source folders (analysed). Scanner auto-detects file types (Python, HTML, CSS, JS, YAML).
sonar.sources=backend/src,frontend/static,frontend/templates,mcp-server/src

# Test folders (separated so they are not counted as duplication/coverage targets).
sonar.tests=backend/tests,mcp-server/tests

# Python version for bytecode-aware checks
sonar.python.version=3.12

# Exclusions: generated/vendored/bytecode content
sonar.exclusions=**/__pycache__/**,**/node_modules/**,**/*.min.js,**/vendor/**,frontend/chrome-extension/icons/**,**/alembic/versions/**
sonar.coverage.exclusions=**/__init__.py,**/alembic/**,frontend/chrome-extension/generate_icons.py

sonar.sourceEncoding=UTF-8
