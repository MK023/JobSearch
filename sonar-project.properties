sonar.organization=mk023
sonar.projectKey=MK023_JobSearch
sonar.projectName=JobSearch
sonar.projectVersion=2.0.0

# Source folders (analysed). Scanner auto-detects file types (Python, HTML, CSS, JS, YAML).
sonar.sources=backend/src,frontend/static,frontend/templates,mcp-server

# Test folders (separated so they are not counted as duplication/coverage targets).
sonar.tests=backend/tests,mcp-server/tests

# Keep MCP server's own tests folder out of sonar.sources (would double-count)
sonar.modules=

# Python version for bytecode-aware checks
sonar.python.version=3.12

# Coverage report produced by the `test` job in ci.yml (pytest --cov-report=xml).
# Required so SonarCloud can evaluate the `new_coverage` quality gate condition.
sonar.python.coverage.reportPaths=backend/coverage.xml

# Exclusions: generated/vendored/bytecode content
sonar.exclusions=**/__pycache__/**,**/node_modules/**,**/*.min.js,**/vendor/**,frontend/chrome-extension/icons/**,**/alembic/versions/**,mcp-server/tests/**

# Coverage exclusions: JobSearch is a Jinja-SSR monolith — no JS unit tests,
# so the frontend JS modules and the Chrome extension popup should not be
# counted against the `new_coverage` quality gate.
sonar.coverage.exclusions=**/__init__.py,**/alembic/**,frontend/chrome-extension/**,frontend/static/js/**

# Copy-Paste Detection thresholds (raised above SonarCloud defaults of
# 100 tokens / 10 lines). Default is aggressive for real-world projects:
# mechanical codemods (e.g. var→const across 20 files) trip false positives
# because they turn similar-pattern lines into "new" lines at once.
# 150/20 still catches real logical duplication without flagging boilerplate.
sonar.cpd.js.minimumTokens=150
sonar.cpd.js.minimumLines=20
sonar.cpd.python.minimumTokens=150
sonar.cpd.python.minimumLines=20

sonar.sourceEncoding=UTF-8
