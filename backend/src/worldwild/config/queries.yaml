# Default queries per source. Marco edita per cambiare cosa cercare.
# Convenzione: chiave = source_name (lowercase), valore = dict con almeno
# `default_queries` (lista di stringhe).
#
# Adzuna IT free tier: 1k chiamate/giorno. 4 query x 4 pagine = 16 chiamate per
# cron run, ordini di grandezza sotto il cap. Buckets scelti sui dati reali del
# funnel di Marco (Dev 14.3% / Cloud 3.8% per career-kit `linkedin_572_deep_dive.md`).

adzuna:
  default_queries:
    - 'devops'
    - 'site reliability engineer'
    - 'cloud engineer'
    - 'python developer'
  country: 'it'
  max_pages: 4

# Predisposto per 8 nuovi adapter — verranno popolati dai sub-agent dedicati.
# Lasciare `default_queries: []` blocca silenziosamente l'adapter (nessuna query
# = nessuna chiamata API), utile come kill-switch runtime senza code push.
remotive:
  default_queries: []
arbeitnow:
  default_queries: []
jobicy:
  default_queries: []
remoteok:
  default_queries: []
themuse:
  default_queries: []
findwork:
  default_queries: []
workingnomads:
  default_queries: []
weworkremotely:
  default_queries: []
