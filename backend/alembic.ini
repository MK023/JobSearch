[alembic]
script_location = alembic
sqlalchemy.url = postgresql://jobsearch:jobsearch@db:5432/jobsearch

# Secondary DB (Supabase, WorldWild ingest layer). The actual URL is read from
# the WORLDWILD_DATABASE_URL env var by alembic_worldwild/env.py — the literal
# below is a placeholder so commands without the env var fail loudly instead
# of writing to the primary DB by accident.
[worldwild]
script_location = alembic_worldwild
sqlalchemy.url = postgresql://placeholder/worldwild

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
